name: Release

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Get version from pom.xml
        id: get_version
        run: echo "version=$(mvn help:evaluate -Dexpression=revision -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Download BuildTools
        run: |
          mkdir -p /tmp/buildtools
          curl -o /tmp/buildtools/BuildTools.jar \
            https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar

      - name: Install Spigot 1.21.8 via BuildTools
        run: |
          mkdir -p /tmp/buildtools/1.21.8 && cd /tmp/buildtools/1.21.8
          java -jar /tmp/buildtools/BuildTools.jar --rev 1.21.8 --remapped
          REMAPPED_JAR=$(ls ~/.m2/repository/org/spigotmc/spigot/1.21.8-R0.1-SNAPSHOT/*remapped-mojang*.jar 2>/dev/null | head -1)
          if [ -z "$REMAPPED_JAR" ]; then
            echo "ERROR: remapped-mojang jar not found!"
            ls ~/.m2/repository/org/spigotmc/spigot/1.21.8-R0.1-SNAPSHOT/
            exit 1
          fi
          SPIGOT_POM=$(ls ~/.m2/repository/org/spigotmc/spigot/1.21.8-R0.1-SNAPSHOT/*.pom | head -1)
          echo "Found: $REMAPPED_JAR"
          mvn install:install-file \
            -Dfile="$REMAPPED_JAR" \
            -DgroupId=org.spigotmc \
            -DartifactId=spigot \
            -Dversion=1.21.8-R0.1-SNAPSHOT \
            -Dclassifier=remapped-mojang \
            -Dpackaging=jar \
            -DpomFile="$SPIGOT_POM"

      - name: Install Spigot 1.21.11 via BuildTools
        run: |
          mkdir -p /tmp/buildtools/1.21.11 && cd /tmp/buildtools/1.21.11
          java -jar /tmp/buildtools/BuildTools.jar --rev 1.21.11 --remapped
          echo "Verifying 1.21.11 remapped artifact..."
          REMAPPED_JAR=$(ls ~/.m2/repository/org/spigotmc/spigot/1.21.11-R0.1-SNAPSHOT/*remapped-mojang*.jar 2>/dev/null | head -1)
          if [ -z "$REMAPPED_JAR" ]; then
            echo "ERROR: remapped-mojang jar not found!"
            ls ~/.m2/repository/org/spigotmc/spigot/1.21.11-R0.1-SNAPSHOT/
            exit 1
          fi
          SPIGOT_POM=$(ls ~/.m2/repository/org/spigotmc/spigot/1.21.11-R0.1-SNAPSHOT/*.pom | head -1)
          echo "Found: $REMAPPED_JAR"
          mvn install:install-file \
            -Dfile="$REMAPPED_JAR" \
            -DgroupId=org.spigotmc \
            -DartifactId=spigot \
            -Dversion=1.21.11-R0.1-SNAPSHOT \
            -Dclassifier=remapped-mojang \
            -Dpackaging=jar \
            -DpomFile="$SPIGOT_POM"

      - name: Build with Maven
        run: mvn clean package -B --no-transfer-progress

      - name: Delete previous releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          releases=$(gh release list --json tagName --jq '.[].tagName' 2>/dev/null || echo "")
          if [ -n "$releases" ]; then
            echo "$releases" | while read tag; do
              echo "Deleting release: $tag"
              gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
            done
          fi

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          gh release create "v${VERSION}" \
            target/DualWield-${VERSION}.jar \
            --title "DualWield v${VERSION}" \
            --notes "DualWield v${VERSION} - Minecraft 1.21.11 Paper support" \
            --latest
